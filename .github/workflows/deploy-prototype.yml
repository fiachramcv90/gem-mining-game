name: Deploy prototype + iOS smoke test to Pages

# Builds the single-threaded Godot web exports (ticket 0002) and publishes them
# to GitHub Pages. TWO throwaway builds share one Pages site:
#   * the 0004 dig-feel prototype  -> served at  /        (prototype/)
#   * the 0011 iOS smoke test      -> served at  /smoke/  (smoke-test/)
# They are combined into one uploaded directory so neither clobbers the other.
#
# Builds/verifies the exports on any listed push; only DEPLOYS from the default
# branch, because the github-pages environment only permits deployments from
# main. Other branches build/verify only (proves the export configs are valid
# before merge).

on:
  push:
    branches:
      - main
      - claude/gem-miner-dig-feel-0004-f2wuc8
      - claude/gem-miner-ios-smoke-0011-xcglyw
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot 4.3 (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      - name: Export dig-feel prototype (0004, single-threaded)
        run: |
          cd prototype
          mkdir -p build
          # first pass imports resources, second pass exports
          godot --headless --import || true
          godot --headless --export-release "Web" build/index.html
          ls -la build

      - name: Export iOS smoke test (0011, single-threaded + PWA)
        run: |
          cd smoke-test
          mkdir -p build
          godot --headless --import || true
          godot --headless --export-release "Web" build/index.html
          ls -la build

      # TEMP diagnostic: actually RUN the smoke scene headless so any _ready/
      # _process runtime script error (which the export step never executes)
      # shows up in the log. Non-fatal — we only want the output.
      - name: Headless smoke-run (catch runtime script errors)
        run: |
          cd smoke-test
          set +e
          timeout 25 godot --headless --quit-after 120 2>&1 | tee run.log
          echo "=== filtered errors ==="
          grep -iE "SCRIPT ERROR|Parse Error|Invalid call|Nonexistent|Cannot call|res://scripts" run.log || echo "no script errors matched"
          exit 0

      - name: Assemble Pages site (prototype at /, smoke test at /smoke/)
        run: |
          rm -rf site
          mkdir -p site/smoke
          cp -r prototype/build/. site/
          cp -r smoke-test/build/. site/smoke/
          echo "--- site/ ---"; ls -la site
          echo "--- site/smoke/ ---"; ls -la site/smoke

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    # Only the default branch may deploy to the github-pages environment.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
