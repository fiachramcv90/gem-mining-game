<!--
  Readable source for the export's `html/head_include` (wayfinder ticket 0011).
  The single-line minified copy of the <script> below is pasted into
  export_presets.cfg → [preset.0.options] html/head_include, because that .cfg
  field is what the CI export actually reads. Keep the two in sync; this file is
  the human-legible original + the reasoning.

  WHY THIS EXISTS — the WASM max-memory lever (0002 §4).
  Godot 4.3's *stock* web export templates already dropped the old fixed 2 GB
  WebAssembly.Memory maximum that iOS Safari 16.2 refused to initialise (godot
  #70621); memory now grows dynamically. There is NO max-memory knob in the 4.3
  export-preset UI — the "proper" way to force a lower ceiling is to rebuild the
  export templates with a smaller emscripten MAXIMUM_MEMORY, which is far too
  heavy for a throwaway smoke test on a stock CI Godot.

  So we take the lever that needs no template rebuild: monkey-patch
  `WebAssembly.Memory` in <head> — which runs BEFORE the engine boots — to clamp
  the `maximum` it requests down to a modest cap (512 MB here). This is the
  browser-side equivalent of the #70621 reporter lowering WASM_MEM_MAX, and it
  directly exercises 0002 §4's exact concern: "does iOS Safari accept a modest
  WASM max at init?" 512 MB (not 256) is deliberate — 0002 §4 notes a hosted
  Godot build can sit near a ~400 MB baseline heap, so 256 MB risks a *false*
  OOM that would confound the test; 512 MB clears that baseline while still being
  a fraction of the old 2 GB. The clamp only ever LOWERS the maximum and never
  below the requested initial, so init cannot fail because of it.

  It also stashes the created Memory object on window.__godotWasmMemory so the
  diagnostic scene can read buffer.byteLength live (works on Safari, unlike
  Chrome-only performance.memory) and show the WASM heap growing toward the cap.
  And it installs a webglcontextlost listener (0002 §4) so a lost context shows
  up big and red on-screen.

  If this shim ever fails to intercept (harmless — it only lowers a maximum),
  the on-screen "cap N MB" / "WASM heap" figures simply read n/a; the rest of
  the smoke test is unaffected.
-->
<script>
(function () {
  var CAP_MB = 512;
  var PAGE = 65536;                       // WASM page = 64 KiB
  var capPages = (CAP_MB * 1024 * 1024) / PAGE;
  window.__wasmMemCapMB = CAP_MB;

  var Orig = WebAssembly.Memory;
  function CappedMemory(desc) {
    try {
      if (desc && typeof desc.maximum === "number") {
        var floor = desc.initial || 0;    // never clamp below the requested initial
        var cap = Math.max(floor, capPages);
        if (desc.maximum > cap) {
          console.log("[smoke 0011] clamping WASM max from " + desc.maximum +
                      " to " + cap + " pages (" + CAP_MB + " MB)");
          desc.maximum = cap;
        }
      }
    } catch (e) { /* clamp is best-effort */ }
    var m = new Orig(desc);
    window.__godotWasmMemory = m;          // expose for the on-screen heap readout
    return m;
  }
  CappedMemory.prototype = Orig.prototype;
  window.WebAssembly.Memory = CappedMemory;

  window.__ctxLost = false;
  window.addEventListener("webglcontextlost", function () {
    window.__ctxLost = true;
  }, true);
})();
</script>
